<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBS Services | Our Therapists</title>
    <style>
        :root { --dark: #0A0A0A; --charcoal: #121212; --accent: #BFA46F; --light: #E5E0D8; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, sans-serif; background: var(--dark); color: #D4CFC7; }
        nav { background: rgba(10,10,10,0.98); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(191,164,111,0.12); }
        nav ul { list-style: none; display: flex; justify-content: center; flex-wrap: wrap; }
        nav a { color: var(--light); text-decoration: none; padding: 22px 32px; font-weight: 500; }
        nav a:hover { color: var(--accent); }
        .container { max-width: 1180px; margin: 0 auto; padding: 0 20px; }
        .hero { text-align: center; padding: 160px 20px 80px; }
        h1 { font-size: 3.6rem; color: var(--accent); letter-spacing: 6px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 40px;
            padding: 60px 0;
        }
        .card {
            background: var(--charcoal);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s;
            border: 1px solid rgba(191,164,111,0.1);
        }
        .card:hover { transform: translateY(-15px); border-color: var(--accent); }
        .card-image { height: 420px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.08); }
        .card-info { padding: 30px 24px; text-align: center; }
        .card-info h3 { color: var(--accent); font-size: 1.65rem; margin-bottom: 10px; }
        .details { color: #B8A88F; margin-bottom: 20px; }
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            margin: 6px 4px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }
        .btn-call { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
        .btn-whatsapp { background: #25D366; color: white; border: none; }
        .btn:hover { transform: translateY(-3px); }
    </style>
</head>
